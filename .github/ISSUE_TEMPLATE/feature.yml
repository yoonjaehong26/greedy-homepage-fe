name: 기능 개발
description: 새 페이지, 컴포넌트, 동작 추가 및 변경
title: "feat: "
body:
  - type: textarea
    id: what
    attributes:
      label: 작업 내용
      description: 한두 문장으로 요약
      placeholder: 스터디 페이지 커리큘럼 타임라인 구현
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: 참고 화면
      description: 디자인 시안 링크 또는 스크린샷
  - type: textarea
    id: done
    attributes:
      label: 완료 기준
      description: 이슈를 닫기 위한 조건
      placeholder: |
        - 데스크톱과 모바일에서 페이즈 5개 표시
        - 데이터는 src/data/study.ts에서 로드
    validations:
      required: true
